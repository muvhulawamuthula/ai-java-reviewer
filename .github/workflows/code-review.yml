name: AI Java Review

# Reviews the Java files changed in a pull request and posts the results as a single,
# self-updating summary comment, inline line-anchored review comments, and SARIF annotations.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.java"

permissions:
  contents: read          # checkout
  pull-requests: write    # post the review comment(s)
  security-events: write  # upload SARIF (inline annotations / Code scanning tab)

concurrency:
  # Cancel an in-progress review when new commits are pushed to the same PR.
  group: ai-java-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # need history to diff against the PR base

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build reviewer
        run: mvn -B -q -DskipTests package

      - name: Compute changed Java files and diff
        id: changed
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          # Added, copied, modified, or renamed .java files (skip deletions).
          git diff --name-only --diff-filter=ACMR "$BASE" "$HEAD" -- '*.java' > changed.txt || true
          # Full unified diff of those files; the reviewer parses it to review only changed lines.
          git diff --diff-filter=ACMR "$BASE" "$HEAD" -- '*.java' > diff.patch || true
          echo "Changed Java files:"
          cat changed.txt
          echo "count=$(wc -l < changed.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Run AI review
        id: review
        if: steps.changed.outputs.count != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REVIEWER_MODEL: claude-sonnet-4-6  # claude-opus-4-8 for the most thorough reviews
          REVIEWER_FAIL_ON: HIGH             # fail the check on HIGH or CRITICAL findings
          REVIEWER_MIN_CONFIDENCE: LOW       # set MEDIUM to suppress lower-confidence findings
          REVIEWER_CONCURRENCY: "4"
          REVIEWER_MAX_TOKENS: "8000"
          REVIEWER_OUTPUT_MD: review-report.md
          REVIEWER_OUTPUT_SARIF: review.sarif
          REVIEWER_OUTPUT_COMMENTS: review-comments.json
          REVIEWER_DIFF_FROM: diff.patch     # diff-aware: only flag changed lines
        run: java -jar target/ai-java-reviewer.jar

      - name: Post summary comment
        if: always() && steps.changed.outputs.count != '0'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: ai-java-reviewer        # makes the comment self-updating
          path: review-report.md

      - name: Post inline review comments
        if: always() && steps.changed.outputs.count != '0'
        continue-on-error: true            # never fail the job on commenting issues
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('review-comments.json')) return;
            const comments = JSON.parse(fs.readFileSync('review-comments.json', 'utf8'));
            if (!comments.length) return;

            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const commit_id = context.payload.pull_request.head.sha;

            // Skip findings we already posted on an earlier run (idempotency via fingerprint marker).
            const existing = await github.paginate(github.rest.pulls.listReviewComments, {
              owner, repo, pull_number, per_page: 100,
            });
            const seen = new Set();
            for (const c of existing) {
              const m = c.body && c.body.match(/ai-reviewer:fp=([0-9a-f]+)/);
              if (m) seen.add(m[1]);
            }
            const fresh = comments.filter(c => !seen.has(c.fingerprint));
            if (!fresh.length) {
              core.info('No new inline comments to post.');
              return;
            }

            const payload = fresh.map(c => ({ path: c.path, line: c.line, side: c.side, body: c.body }));
            try {
              // Preferred path: one review carrying all comments.
              await github.rest.pulls.createReview({
                owner, repo, pull_number, commit_id, event: 'COMMENT', comments: payload,
              });
              core.info(`Posted ${payload.length} inline comment(s).`);
            } catch (err) {
              // A line outside the diff makes the whole review fail; fall back to posting
              // each comment individually and skipping the ones GitHub rejects.
              core.warning(`Batch review failed (${err.message}); posting individually.`);
              for (const c of fresh) {
                try {
                  await github.rest.pulls.createReviewComment({
                    owner, repo, pull_number, commit_id,
                    path: c.path, line: c.line, side: c.side, body: c.body,
                  });
                } catch (e) {
                  core.info(`Skipped ${c.path}:${c.line} (${e.message}).`);
                }
              }
            }

      - name: Upload SARIF (inline annotations / Code scanning)
        if: always() && steps.changed.outputs.count != '0'
        continue-on-error: true            # SARIF upload needs code scanning enabled
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: review.sarif
          category: ai-java-reviewer
